[project]
name = "b2b-ec-pipeline"
version = "0.1.0"
description = "Core ingestion pipeline logic decoupled from orchestration"
requires-python = ">=3.12"
dependencies = [
    "jinja2>=3.1.4",
    "pydantic>=2.12.0",
    "polars>=1.34.0",
    "b2b-ec-utils",
    "b2b-ec-sources",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/b2b_ec_pipeline"]

[tool.hatch.build.targets.wheel.force-include]
"src/b2b_ec_pipeline/state/sql" = "b2b_ec_pipeline/state/sql"

[tool.uv.sources]
b2b-ec-utils = { workspace = true, editable = true }
b2b-ec-sources = { workspace = true, editable = true }
