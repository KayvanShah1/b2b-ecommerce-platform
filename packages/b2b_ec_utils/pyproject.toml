[project]
name = "b2b-ec-utils"
version = "0.1.0"
description = "A collection of utilities for B2B applications."
dependencies = [
    "pydantic-settings",
    "pydantic",
    "s3fs>=2026.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/b2b_ec_utils"]
