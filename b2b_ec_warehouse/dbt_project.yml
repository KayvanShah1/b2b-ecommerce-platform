name: b2b_ec_warehouse

profile: b2b_ec_warehouse

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
    - "target"
    - "dbt_packages"

seeds:
    # Builds seeds into '<your_schema_name>_raw'
    b2b_warehouse:
        +schema: raw

models:
    b2b_warehouse:
        # Materialize staging models as views, and marts as tables
        staging:
            +materialized: view
        marts:
            +materialized: table
